<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="/submit_registration" method="POST">
        <label for="studentID">Student ID:</label><br>
        <input type="text" id="studentID" name="studentID" required><br><br>

        <label for="program">Select Program:</label><br>
        <select id="program" name="program" required>
            <option value="program1">Program 1</option>
            <option value="program2">Program 2</option>
            <option value="program3">Program 3</option>
        </select><br><br>

        <label for="level">Select Level:</label><br>
        <select id="level" name="level" required>
            <option value="undergraduate">Undergraduate</option>
            <option value="graduate">Graduate</option>
        </select><br><br>

        <h2>Account Setup</h2>
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" required><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br>

        <h2>Contact Information</h2>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <button type="submit">Submit</button>
    </form>
    <h2>Review Steps</h2>
    <ol>
        <li>Verify your Student ID.</li>
        <li>Select your desired program and level.</li>
        <li>Set up your account.</li>
        <li>Provide contact information.</li>
        <li>Review your submission before hitting submit.</li>
    </ol>
</body>
</html>
