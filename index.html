            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {

            .logo h1 { font-size: 1.4rem; }
            input { font-size: 16px; }
            .admission-banner { flex-direction: column; text-align: center; gap: 12px; }
        }

            <div class="logo-icon"><i class="fas fa-university"></i></div>
            <h1>G-Hive Portal</h1>

        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Student ID</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="studentId" placeholder="Enter your student ID" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="forgot-link">
                    <a href="#" onclick="alert('Please contact admin to reset password')">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="register-section">
            <p>Don't have an account?</p>

                <i class="fas fa-user-plus"></i> Register as New Student

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHuf2oqqUUIc01JU7Onu_P95qi5yTB1iahDdNgXCBR0zWOqhHlbSsQ0Nu20AGqlz8S_Q/exec";
        function showError(msg) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => errorMsg.style.display = 'none', 5000);
        }
        async function handleLogin(event) {
            event.preventDefault();
            const studentId = document.getElementById('studentId').value.trim();
            const password = document.getElementById('password').value;
            if (!studentId || !password) {
                showError("Please enter both ID and password");
                return;
            }
            if (studentId && password) {
                localStorage.setItem('studentId', studentId);
                localStorage.setItem('userData', JSON.stringify({
                    profile: { id: studentId, name: 'Demo Student', program: 'RN', level: 200 }
                }));
                window.location.href = 'dashboard.html';
                return;
            }
            try {
                const response = await fetch(SCRIPT_URL + '?id=' + encodeURIComponent(studentId) + '&password=' + encodeURIComponent(password));
                const data = await response.json();
                if (data.profile) {
                    localStorage.setItem('userData', JSON.stringify(data));
                    localStorage.setItem('studentId', studentId);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.error || "Invalid credentials");
                }
            } catch (e) {
                showError("Connection error. Please try again.");
            }
        }
        function showForgotMessage() {
            alert("Please contact the academic office or visit the admin desk to reset your password.");
        }
    </script>
